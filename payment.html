<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; padding: 2rem 1rem; }
        .checkout-box { max-width: 650px; margin: 0 auto; background: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        
        .gateway-banner { background-color: #1e3a8a; color: #ffffff; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        
        .order-summary { background: #f8fafc; padding: 1.5rem 2rem; border-bottom: 1px solid #e2e8f0; }
        .order-row { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 0.5rem; }
        
        .payment-methods { padding: 2rem; }
        .method-row { border: 1px solid #cbd5e1; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s; }
        .method-row:hover { border-color: #1d4ed8; background: #f8fafc; }
        .method-header { display: flex; align-items: center; gap: 0.75rem; font-weight: 600; }
        
        .form-inline { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; }
        .form-control { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.9rem; }
        
        .btn-pay { width: 100%; text-align: center; display: block; background: #10b981; color: #fff; padding: 1rem; text-decoration: none; font-weight: 700; border-radius: 0 0 8px 8px; font-size: 1.1rem; border: none; cursor: pointer; }
        .btn-pay:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="checkout-box">
        <div class="gateway-banner">
            <h2>Secure Payment Desk</h2>
            <span style="font-size: 0.85rem; padding: 0.25rem 0.5rem; background: rgba(255,255,255,0.2); border-radius: 4px;">SSL Secured 256-Bit</span>
        </div>

        <div class="order-summary">
            <div class="order-row"><span>Service Action Type:</span><strong>Mobile Prepaid Recharge</strong></div>
            <div class="order-row"><span>Target Destination Line:</span><strong>+91 9876543210 (Jio)</strong></div>
            <div class="order-row" style="margin-bottom:0; font-size:1.15rem; color:#1e3a8a; padding-top:0.5rem; border-top:1px dashed #cbd5e1;"><span>Total Due Payable:</span><strong>Rs. 299.00</strong></div>
        </div>

        <form action="success.html" method="GET" class="payment-methods">
            <h3 style="font-size:1.1rem; margin-bottom:1rem; color:#475569;">Select Funding Mechanism</h3>
            
            <div class="method-row">
                <div class="method-header">
                    <input type="radio" name="pay_mode" id="upi" checked>
                    <label for="upi">Unified Payments Interface (UPI)</label>
                </div>
                <div style="margin-top: 0.75rem; padding-left: 1.5rem;">
                    <input type="text" class="form-control" style="max-width:300px;" value="jatin@upi" placeholder="vpa@bankhandle">
                </div>
            </div>

            <div class="method-row">
                <div class="method-header">
                    <input type="radio" name="pay_mode" id="card">
                    <label for="card">Credit or Debit Card</label>
                </div>
                <div class="form-inline">
                    <input type="text" class="form-control" placeholder="Card Number" style="grid-column: 1 / -1;">
                    <input type="text" class="form-control" placeholder="MM/YY">
                    <input type="password" class="form-control" placeholder="CVV">
                </div>
            </div>

            <div class="method-row">
                <div class="method-header">
                    <input type="radio" name="pay_mode" id="wallet">
                    <label for="wallet">Internal Account Balance Wallet (Rs. 500 Available)</label>
                </div>
            </div>

            <button type="submit" class="btn-pay">Authorize Payment Execution (Rs. 299.00)</button>
        </form>
    </div>
</body>
</html>
